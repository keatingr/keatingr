<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 820" role="img">
  <title>SEC Filing Investigative Agent - ReAct Architecture</title>
  <desc>Three-stage pipeline: Theory Agent, Investigator Agent with ReAct loop, Finalizer Agent, showing evidence grounding and deterministic guardrails.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .svgt  { font: 400 14px system-ui, sans-serif; fill: #3a3a3a; }
    .svgth { font: 500 14px system-ui, sans-serif; fill: #0f0f0f; }
    .svgts { font: 400 12px system-ui, sans-serif; fill: #6b6b6b; }
    .svgarr { stroke: #888780; stroke-width: 1; fill: none; marker-end: url(#arrow); }
  </style>

  <rect x="220" y="20" width="240" height="40" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text class="svgth" x="340" y="40" text-anchor="middle" dominant-baseline="central">SEC filing (10-K PDF)</text>

  <line x1="340" y1="60" x2="340" y2="85" class="svgarr"/>
  <text class="svgts" x="352" y="76">Multimodal parsing</text>

  <rect x="100" y="88" width="480" height="80" rx="10" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text class="svgth" x="340" y="113" text-anchor="middle" dominant-baseline="central" fill="#085041">Stage 1 - Theory Agent</text>
  <text class="svgts" x="340" y="133" text-anchor="middle" fill="#085041">Extracts evidence rows | clusters signals</text>
  <text class="svgts" x="340" y="151" text-anchor="middle" fill="#085041">evidence rows -&gt; decisions -&gt; candidate theories</text>

  <line x1="340" y1="168" x2="340" y2="193" class="svgarr"/>
  <text class="svgts" x="352" y="184">candidate theories</text>

  <rect x="60" y="196" width="560" height="390" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text class="svgth" x="340" y="220" text-anchor="middle" dominant-baseline="central" fill="#3c3489">Stage 2 - Investigator Agent (ReAct)</text>

  <rect x="88" y="234" width="504" height="248" rx="8" fill="none" stroke="#afa9ec" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text class="svgts" x="104" y="250" fill="#7f77dd">Per-theory ReAct loop</text>

  <rect x="108" y="260" width="130" height="50" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text class="svgth" x="173" y="280" text-anchor="middle" dominant-baseline="central" fill="#0c447c">Plan</text>
  <text class="svgts" x="173" y="298" text-anchor="middle" dominant-baseline="central" fill="#185fa5">create_review_plan</text>

  <line x1="238" y1="285" x2="268" y2="285" class="svgarr"/>

  <rect x="270" y="260" width="130" height="50" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text class="svgth" x="335" y="280" text-anchor="middle" dominant-baseline="central" fill="#0c447c">Ground</text>
  <text class="svgts" x="335" y="298" text-anchor="middle" dominant-baseline="central" fill="#185fa5">evidence_grounding</text>

  <line x1="400" y1="285" x2="430" y2="285" class="svgarr"/>

  <rect x="432" y="260" width="140" height="50" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
  <text class="svgth" x="502" y="280" text-anchor="middle" dominant-baseline="central" fill="#0c447c">Adjudicate</text>
  <text class="svgts" x="502" y="298" text-anchor="middle" dominant-baseline="central" fill="#185fa5">llm_adjudicate_claim</text>

  <path d="M502 310 L502 340 L335 340 L335 320" fill="none" stroke="#9f9dd0" stroke-width="0.8" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <text class="svgts" x="418" y="357" text-anchor="middle" fill="#7f77dd">if overbroad -&gt; narrow_claim -&gt; re-ground</text>

  <rect x="108" y="380" width="504" height="86" rx="8" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
  <text class="svgth" x="360" y="403" text-anchor="middle" dominant-baseline="central" fill="#444441">Evidence grounding</text>
  <text class="svgts" x="360" y="422" text-anchor="middle" fill="#444441">Page-grounded filing spans | cluster-scoped | quality-ranked</text>
  <text class="svgts" x="360" y="440" text-anchor="middle" fill="#444441">supporting spans | evidence_ids preserved</text>
  <text class="svgts" x="360" y="458" text-anchor="middle" fill="#444441">SUPPORTED / PARTIAL / overbroad / contradicted</text>

  <rect x="108" y="482" width="504" height="88" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
  <text class="svgth" x="360" y="505" text-anchor="middle" dominant-baseline="central" fill="#712b13">Deterministic guardrails</text>
  <text class="svgts" x="360" y="524" text-anchor="middle" fill="#712b13">LLM proposes | code enforces</text>
  <text class="svgts" x="360" y="542" text-anchor="middle" fill="#712b13">CONTRADICTED -&gt; reject | no evidence_ids -&gt; abstain</text>
  <text class="svgts" x="360" y="560" text-anchor="middle" fill="#712b13">overbroad -&gt; narrow + re-ground | caveated -&gt; promote with caveats</text>

  <line x1="340" y1="586" x2="340" y2="618" class="svgarr"/>
  <text class="svgts" x="352" y="607">eligible theories</text>

  <rect x="100" y="620" width="480" height="80" rx="10" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
  <text class="svgth" x="340" y="645" text-anchor="middle" dominant-baseline="central" fill="#633806">Stage 3 - Finalizer Agent</text>
  <text class="svgts" x="340" y="665" text-anchor="middle" fill="#633806">Ranks by confidence | evidence count | materiality</text>
  <text class="svgts" x="340" y="683" text-anchor="middle" fill="#633806">Deduplicates | assigns FINAL / FINAL_WITH_CAVEATS</text>

  <line x1="340" y1="700" x2="340" y2="730" class="svgarr"/>
  <text class="svgts" x="352" y="720">ranked findings</text>

  <rect x="160" y="733" width="360" height="60" rx="8" fill="#eaf3de" stroke="#3b6d11" stroke-width="0.5"/>
  <text class="svgth" x="340" y="757" text-anchor="middle" dominant-baseline="central" fill="#27500a">Executive findings + decision ledger</text>
  <text class="svgts" x="340" y="777" text-anchor="middle" fill="#27500a">findings | traceable evidence IDs | audit artifacts</text>
</svg>
